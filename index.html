<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧鎖系統文件補完工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">System Document Completion Web App</p>
        <h1>智慧鎖派工平台開發前置需求確認</h1>
      </div>
      <button id="exportBtn" class="primary">匯出補完報告</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>角色</h2>
        <div id="roleList" class="role-list"></div>

        <section class="progress">
          <h2>文件補完進度</h2>
          <div id="docProgress"></div>
        </section>
      </aside>

      <section class="workspace">
        <div class="intro">
          <div>
            <p class="eyebrow">正式開發前使用</p>
            <h2 id="roleTitle">請選擇角色開始訪談</h2>
          </div>
          <p id="roleDescription">
            此工具不是派工平台 MVP，而是用來收集現場流程、痛點、異常情境與帳務規則，協助 AI specialist 補完 system documents。
          </p>
        </div>

        <div id="questionPanel" class="question-panel"></div>
      </section>

      <aside class="insights">
        <h2>待決策與衝突</h2>
        <div id="insightList" class="insight-list"></div>

        <h2>輸出對應</h2>
        <div class="mapping">
          <span>ProblemCard</span>
          <span>WorkOrder</span>
          <span>Dispatch</span>
          <span>Pricing</span>
          <span>Exception</span>
          <span>Accounting</span>
          <span>Inventory</span>
          <span>RBAC</span>
        </div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
